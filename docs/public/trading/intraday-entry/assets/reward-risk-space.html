<div id="reward-risk-space" style="width:100%;color:var(--foreground,#1e293b)">
  <svg viewBox="0 0 1000 520" role="img" aria-labelledby="rr-title rr-desc" style="display:block;width:100%;height:auto">
    <title id="rr-title">目标空间与止损距离的对比</title>
    <desc id="rr-desc">左图突破回踩后上方空间充足，潜在收益大于结构风险；右图虽然出现突破回踩，但已经接近供给区，目标空间不足，不应追价。</desc>
    <defs>
      <marker id="rr-arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--viz-series-2,#16a34a)"/></marker>
      <marker id="rr-arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--destructive,#dc2626)"/></marker>
    </defs>
    <text x="500" y="27" text-anchor="middle" font-size="22" font-weight="500">③出现后，先问：目标空间够不够？</text>
    <text x="500" y="50" text-anchor="middle" font-size="13" fill="var(--muted-foreground,#64748b)">同样的突破回踩，位置不同，交易价值可能完全不同</text>

    <!-- left: enough room -->
    <g transform="translate(25 78)">
      <text x="225" y="0" text-anchor="middle" font-size="17" font-weight="500">A. 空间足够：可以评估</text>
      <rect x="0" y="18" width="450" height="390" rx="8" fill="var(--card,#ffffff)" stroke="var(--border,#dbe3ec)"/>
      <g stroke="var(--border,#e5e7eb)" stroke-width="1">
        <line x1="30" y1="70" x2="420" y2="70"/><line x1="30" y1="135" x2="420" y2="135"/><line x1="30" y1="200" x2="420" y2="200"/><line x1="30" y1="265" x2="420" y2="265"/><line x1="30" y1="330" x2="420" y2="330"/>
      </g>
      <rect x="30" y="52" width="390" height="42" fill="var(--destructive,#dc2626)" opacity=".13"/>
      <line x1="30" y1="73" x2="420" y2="73" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="8 5"/>
      <text x="412" y="67" text-anchor="end" font-size="11">下一供给区 / 目标</text>
      <line x1="30" y1="225" x2="420" y2="225" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="8 5"/>
      <text x="38" y="217" font-size="11">VWAP / 突破边界</text>
      <rect x="30" y="336" width="390" height="38" fill="var(--viz-series-2,#16a34a)" opacity=".13"/>
      <text x="412" y="360" text-anchor="end" font-size="11">需求区</text>
      <g stroke-linecap="round">
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="70" y1="168" x2="70" y2="350" stroke-width="3"/><rect x="60" y="210" width="20" height="82" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="125" y1="245" x2="125" y2="330" stroke-width="3"/><rect x="115" y="255" width="20" height="48" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="180" y1="185" x2="180" y2="265" stroke-width="3"/><rect x="170" y="205" width="20" height="43" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="235" y1="210" x2="235" y2="285" stroke-width="3"/><rect x="225" y="225" width="20" height="36" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="290" y1="145" x2="290" y2="235" stroke-width="3"/><rect x="280" y="165" width="20" height="52" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="345" y1="105" x2="345" y2="180" stroke-width="3"/><rect x="335" y="125" width="20" height="42" rx="2"/></g>
      </g>
      <circle cx="290" cy="145" r="15" fill="var(--viz-series-2,#16a34a)"/><text x="290" y="150" text-anchor="middle" font-size="11" fill="var(--primary-foreground,#fff)">③</text>
      <line x1="290" y1="145" x2="290" y2="73" stroke="var(--viz-series-2,#16a34a)" stroke-width="3" marker-end="url(#rr-arrow-green)"/>
      <text x="304" y="111" font-size="12" fill="var(--viz-series-2,#16a34a)">收益空间约 1.6R</text>
      <line x1="290" y1="145" x2="290" y2="292" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#rr-arrow-red)"/>
      <text x="300" y="275" font-size="12" fill="var(--destructive,#dc2626)">结构止损 1R</text>
      <text x="225" y="395" text-anchor="middle" font-size="13" fill="var(--viz-series-2,#16a34a)">入场到目标 &gt; 入场到止损：值得评估</text>
    </g>

    <!-- right: not enough room -->
    <g transform="translate(525 78)">
      <text x="225" y="0" text-anchor="middle" font-size="17" font-weight="500">B. 空间不足：放弃追价</text>
      <rect x="0" y="18" width="450" height="390" rx="8" fill="var(--card,#ffffff)" stroke="var(--border,#dbe3ec)"/>
      <g stroke="var(--border,#e5e7eb)" stroke-width="1">
        <line x1="30" y1="70" x2="420" y2="70"/><line x1="30" y1="135" x2="420" y2="135"/><line x1="30" y1="200" x2="420" y2="200"/><line x1="30" y1="265" x2="420" y2="265"/><line x1="30" y1="330" x2="420" y2="330"/>
      </g>
      <rect x="30" y="52" width="390" height="60" fill="var(--destructive,#dc2626)" opacity=".16"/>
      <line x1="30" y1="82" x2="420" y2="82" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="8 5"/>
      <text x="412" y="74" text-anchor="end" font-size="11">供给区 / 近距离目标</text>
      <line x1="30" y1="225" x2="420" y2="225" stroke="var(--viz-series-1,#2563eb)" stroke-width="2" stroke-dasharray="8 5"/>
      <text x="38" y="217" font-size="11">VWAP / 突破边界</text>
      <rect x="30" y="336" width="390" height="38" fill="var(--viz-series-2,#16a34a)" opacity=".13"/>
      <text x="412" y="360" text-anchor="end" font-size="11">下方需求区</text>
      <g stroke-linecap="round">
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="70" y1="290" x2="70" y2="350" stroke-width="3"/><rect x="60" y="305" width="20" height="30" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="125" y1="230" x2="125" y2="320" stroke-width="3"/><rect x="115" y="250" width="20" height="45" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="180" y1="165" x2="180" y2="245" stroke-width="3"/><rect x="170" y="185" width="20" height="42" rx="2"/></g>
        <g stroke="var(--viz-series-2,#16a34a)" fill="var(--viz-series-2,#16a34a)"><line x1="235" y1="110" x2="235" y2="195" stroke-width="3"/><rect x="225" y="130" width="20" height="43" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="290" y1="72" x2="290" y2="155" stroke-width="3"/><rect x="280" y="92" width="20" height="42" rx="2"/></g>
        <g stroke="var(--destructive,#dc2626)" fill="var(--destructive,#dc2626)"><line x1="345" y1="66" x2="345" y2="160" stroke-width="3"/><rect x="335" y="90" width="20" height="45" rx="2"/></g>
      </g>
      <circle cx="290" cy="72" r="15" fill="var(--destructive,#dc2626)"/><text x="290" y="77" text-anchor="middle" font-size="11" fill="var(--primary-foreground,#fff)">③</text>
      <line x1="290" y1="72" x2="290" y2="58" stroke="var(--destructive,#dc2626)" stroke-width="3" marker-end="url(#rr-arrow-red)"/>
      <text x="304" y="55" font-size="12" fill="var(--destructive,#dc2626)">只剩 0.4R 空间</text>
      <line x1="290" y1="72" x2="290" y2="134" stroke="var(--destructive,#dc2626)" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#rr-arrow-red)"/>
      <text x="302" y="158" font-size="12" fill="var(--destructive,#dc2626)">止损约 1R</text>
      <text x="225" y="395" text-anchor="middle" font-size="13" fill="var(--destructive,#dc2626)">目标空间 &lt; 结构风险：不追，等新结构</text>
    </g>
  </svg>
</div>
