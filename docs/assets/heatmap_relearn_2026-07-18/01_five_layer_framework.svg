<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600"><defs><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="680" height="600" fill="#FFFFFF"/><rect x="170" y="16" width="340" height="66" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text x="340" y="43" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#042C53">第一层 · 原理引擎</text><text x="340" y="64" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#185FA5">对冲是数学强制,不是心理</text><line x1="340" y1="82" x2="340" y2="114" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/><rect x="170" y="122" width="340" height="66" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text x="340" y="149" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#042C53">第二层 · 时间结构</text><text x="340" y="170" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#185FA5">到期组决定力量权重</text><line x1="340" y1="188" x2="340" y2="220" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/><rect x="170" y="228" width="340" height="66" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text x="340" y="255" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#042C53">第三层 · 六步读图</text><text x="340" y="276" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#185FA5">现价到 King 到边界</text><line x1="340" y1="294" x2="340" y2="326" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/><rect x="170" y="334" width="340" height="66" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text x="340" y="361" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#042C53">第四层 · 双重验证</text><text x="340" y="382" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#185FA5">横向共振 · 纵向追踪</text><line x1="340" y1="400" x2="340" y2="432" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/><rect x="170" y="440" width="340" height="66" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text x="340" y="467" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#042C53">第五层 · 分类与执行</text><text x="340" y="488" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#185FA5">结构定剧本,原则定动作</text><line x1="340" y1="506" x2="340" y2="530" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/><rect x="100" y="538" width="480" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/><text x="340" y="560" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">边界:不预测方向 · 只是估算 · 挡不住事件</text><text x="340" y="579" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A">任何一层的结论都要过这条底线</text></svg>